name: Create OCI Instance
on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  create:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
      - name: Install dependencies
        run: composer install --prefer-dist --no-progress
      - name: Save private key to file
        run: |
          echo "${{ secrets.OCI_PRIVATE_KEY }}" > /home/runner/oci_private_key.pem
          chmod 600 /home/runner/oci_private_key.pem
      - name: Try to create instance
        run: php index.php || echo "PHP exited with code $?"
        continue-on-error: tr
